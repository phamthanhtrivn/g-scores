version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: g-scores-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - gscores_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  gscores_data:
